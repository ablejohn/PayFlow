version: '3.9'

services:
  api:
    build: ./backend
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://payflow:payflow@db:5432/payflow
      JWT_SECRET: local_dev_secret_change_in_production
      JWT_EXPIRES_IN: 7d
      AWS_REGION: eu-north-1
      AWS_BUCKET_NAME: payflow-dev
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules     # Prevent host node_modules overwriting container's

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     payflow
      POSTGRES_PASSWORD: payflow
      POSTGRES_DB:       payflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d  # Auto-runs migrations
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payflow']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
